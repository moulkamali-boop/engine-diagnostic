<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تشخيص المحرك - النسخة النهائية</title>
  <style>
    body { background: #0a0a0a; color: #eee; font-family: Arial; text-align: center; padding: 20px; }
    .container { max-width: 500px; margin: auto; }
    .btn { background: #ffd700; color: #1a1a1a; border: none; padding: 14px; border-radius: 30px; width: 100%; margin: 8px 0; font-weight: bold; cursor: pointer; }
    .btn-danger { background: #ff6600; color: white; }
    .result { background: #0d2b1a; border: 1px solid #ffd700; border-radius: 16px; padding: 20px; margin-top: 20px; }
    .counter { background: #1a1a1a; padding: 10px; border-radius: 12px; color: #ffd700; margin-bottom: 10px; }
    .status { margin-top: 5px; padding: 5px; border-radius: 8px; font-size: 0.8rem; }
    .success { background: #00a86b; }
    .recording { background: #ff4444; }
    .hidden { display: none; }
    input, label { display: block; width: 100%; margin: 8px 0; text-align: center; }
  </style>
</head>
<body>
<div class="container">
  <h1>🔧 تشخيص المحرك</h1>
  <div class="counter" id="counter">🔓 المجانية: 3/3</div>

  <!-- تسجيل الصوت -->
  <button id="micBtn" class="btn">🎤 تسجيل الصوت (5 ثوانٍ)</button>
  <div id="micStatus" class="status hidden"></div>

  <!-- خياران لالتقاط صورة العادم (كاميرا أو رفع) -->
  <button id="camBtn" class="btn">📸 تصوير العادم بالكاميرا</button>
  <label for="uploadImage" class="btn" style="background:#333;">🖼️ أو رفع صورة من المعرض</label>
  <input type="file" id="uploadImage" accept="image/*" style="display:none;">
  <div id="camStatus" class="status hidden"></div>

  <button id="diagnoseBtn" class="btn">🔍 شخص الآن</button>

  <div id="resultCard" class="result hidden">
    <h3>نتيجة التشخيص</h3>
    <div id="resultText"></div>
    <button id="downloadBtn" class="btn">📄 تحميل PDF</button>
    <button id="subscribeBtn" class="btn btn-danger hidden">🔒 الاشتراك ($20/شهر)</button>
  </div>
</div>

<script>
  let audioBlob = null;
  let imageData = null;
  let freeCount = parseInt(localStorage.getItem('freeDiag')) || 0;
  let micBtn = document.getElementById('micBtn');
  let camBtn = document.getElementById('camBtn');
  let uploadInput = document.getElementById('uploadImage');
  let diagnoseBtn = document.getElementById('diagnoseBtn');
  let downloadBtn = document.getElementById('downloadBtn');
  let subscribeBtn = document.getElementById('subscribeBtn');
  let micStatus = document.getElementById('micStatus');
  let camStatus = document.getElementById('camStatus');
  let resultCard = document.getElementById('resultCard');
  let resultText = document.getElementById('resultText');
  let counterDiv = document.getElementById('counter');

  function updateCounter() {
    counterDiv.innerHTML = `🔓 المجانية: ${3 - freeCount} / 3`;
    if(freeCount >= 3) subscribeBtn.classList.remove('hidden');
  }

  // تسجيل الصوت
  micBtn.onclick = async () => {
    micBtn.disabled = true;
    micStatus.classList.remove('hidden');
    micStatus.className = 'status recording';
    micStatus.innerHTML = "🔴 جاري التسجيل...";
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const recorder = new MediaRecorder(stream);
      let chunks = [];
      recorder.ondataavailable = e => chunks.push(e.data);
      recorder.onstop = () => {
        audioBlob = new Blob(chunks, { type: 'audio/wav' });
        micStatus.className = 'status success';
        micStatus.innerHTML = "✅ تم التسجيل";
        micBtn.disabled = false;
        stream.getTracks().forEach(t => t.stop());
      };
      recorder.start();
      setTimeout(() => recorder.stop(), 5000);
    } catch(e) {
      micStatus.innerHTML = "❌ فشل التسجيل (امنح الإذن)";
      micBtn.disabled = false;
    }
  };

  // تصوير بالكاميرا
  camBtn.onclick = async () => {
    camBtn.disabled = true;
    camStatus.classList.remove('hidden');
    camStatus.className = 'status recording';
    camStatus.innerHTML = "📸 جاري تشغيل الكاميرا...";
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      const video = document.createElement('video');
      video.srcObject = stream;
      video.play();
      camStatus.innerHTML = "📸 جاري التصوير خلال ثانية...";
      setTimeout(() => {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        imageData = canvas.toDataURL('image/jpeg', 0.8);
        camStatus.className = 'status success';
        camStatus.innerHTML = "✅ تم التصوير";
        camBtn.disabled = false;
        stream.getTracks().forEach(t => t.stop());
      }, 1000);
    } catch(e) {
      camStatus.innerHTML = "❌ فشل الكاميرا. استخدم رفع الصورة بدلاً من ذلك.";
      camBtn.disabled = false;
    }
  };

  // رفع صورة من المعرض
  uploadInput.onchange = (e) => {
    const file = e.target.files[0];
    if(file) {
      const reader = new FileReader();
      reader.onload = function(ev) {
        imageData = ev.target.result;
        camStatus.classList.remove('hidden');
        camStatus.className = 'status success';
        camStatus.innerHTML = "✅ تم رفع الصورة بنجاح";
      };
      reader.readAsDataURL(file);
    }
  };

  // التشخيص
  diagnoseBtn.onclick = () => {
    if(freeCount >= 3) {
      resultText.innerHTML = "⚠️ استنفذت التشخيصات المجانية. اشترك للمتابعة.";
      resultCard.classList.remove('hidden');
      subscribeBtn.classList.remove('hidden');
      return;
    }
    if(!audioBlob || !imageData) {
      resultText.innerHTML = "⚠️ يرجى تسجيل الصوت وتصوير/رفع صورة العادم أولاً.";
      resultCard.classList.remove('hidden');
      return;
    }
    freeCount++;
    localStorage.setItem('freeDiag', freeCount);
    updateCounter();
    resultText.innerHTML = "✅ المحرك سليم (تشخيص أولي). اشترك للتفاصيل العميقة.";
    resultCard.classList.remove('hidden');
    if(freeCount >= 3) subscribeBtn.classList.remove('hidden');
  };

  downloadBtn.onclick = () => alert("سيتم تفعيل PDF في التحديث القادم");
  subscribeBtn.onclick = () => window.location.href = "https://ai-moto-maintenance.lemonsqueezy.com/checkout/buy/c3abadc2-c6cc-459e-a106-de43d4f2d3f0";

  updateCounter();
</script>
</body>
</html>
